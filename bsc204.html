<!DOCTYPE html>
<html>
<head>
  <title>BSC 204 Devices</title>
  <link rel="icon" type="image/png" href="background.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <h1>BSC 204 Devices</h1>
    <div class="button-container">
      <a href="http://10.30.6.10" target="_blank" class="bubble-button">IPCP</a>
      <a href="https://10.30.6.10/web/vtlp/bsc204/index.html#/main" target="_blank" class="bubble-button">TLP</a>
    </div>
    <br>
    <div class="nav-buttons">
        <a href="bsc.html" class="bubble-button back-button">← Back to BSC Classrooms</a>
        <a href="index.html" class="bubble-button back-button">Home</a>
    </div>
    
  </div>


  <!-- LOGS CLICKS -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll('.bubble-button').forEach(button => {
    button.addEventListener('click', () => {
      const page = "BCS 204 Devices";
      const action = "button_click";
      const timestamp = new Date().toISOString();
      const details = `Clicked button: ${button.textContent.trim()} (${button.href || 'no href'})`;

      fetch("http://localhost:3000/api/log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ page, action, timestamp, details }),
      });
    });
  });
});
</script>



</body>
</html>
