<!DOCTYPE html>
<html>
<head>
  <title>SPMT Devices</title>
  <link rel="icon" type="image/png" href="background.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <h1>SPMT Devices</h1>
    <div class="button-container">
      <a href="http://10.30.107.10" target="_blank" class="bubble-button">MLC 400</a>
    </div>
    <br>
    <div class="nav-buttons">
      <a href="index.html" class="bubble-button back-button">Home</a>
    </div>
  </div>

    <!-- LOGS CLICKS -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll('.bubble-button').forEach(button => {
    button.addEventListener('click', () => {
      const page = "SPMT Devices";
      const action = "button_click";
      const timestamp = new Date().toISOString();
      const details = `Clicked button: ${button.textContent.trim()} (${button.href || 'no href'})`;

      fetch("http://localhost:3000/api/log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ page, action, timestamp, details }),
      });
    });
  });
});
</script>

</body>
</html>
