<html>

  <title>MEC LAB Devices</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-wrapper">
    <h1>MEC LAB Devices</h1>
    <div class="button-container">
      <a href="https://10.30.106.10/web/vtlp/ce101cb0-dddd-4268-bbc6-6ab45e5566a3/index.html#!/main" target="_blank" class="bubble-button">MLC 400</a>

      <a href="index.html" class="bubble-button back-button">Home</a>
      </div>

          <!-- LOGS CLICKS -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll('.bubble-button').forEach(button => {
    button.addEventListener('click', () => {
      const page = "KIN 2 Devices";
      const action = "button_click";
      const timestamp = new Date().toISOString();
      const details = `Clicked button: ${button.textContent.trim()} (${button.href || 'no href'})`;

      fetch("http://localhost:3000/api/log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ page, action, timestamp, details }),
      });
    });
  });
});
</script>



</body>
</html>
